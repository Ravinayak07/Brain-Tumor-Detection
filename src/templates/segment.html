<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Segmentation</title>
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #3F51b5;
      padding: 20px;
    }

    h1 {
      color: #fff;
      margin: 0;
      text-align: center;
      /* center align horizontally */
      flex-grow: 1;
      /* take up remaining horizontal space */
    }

    form {
      display: flex;
      flex-direction: row;
      align-items: center;
      margin-top: 50px;
      justify-content: space-evenly;
    }

    /* Style the file input */
    input[type="file"] {
      padding: 10px 12px;
      border-radius: 5px;
      border: none;
      background-color: #3F51b5;
      color: white;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 40px;
    }


    img {
      border: 1px solid #ccc;
      border-radius: 5px;
      box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.3);
    }

    button[type="submit"] {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background-color: #3F51b5;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button[type="submit"]:hover {
      background-color: #333;
    }

    form>h2 {
      padding: 10px 20px;
      font-size: 30px;
      transform: scale(1);
    }

    .button:hover {
      background-color: #0822b5;
      color: whitesmoke;
    }

    #container {
      display: flex;
      flex-direction: column;
    }

    #output {
      padding: 10px 12px;
      border-radius: 5px;
      border: none;
      background-color: #3F51b5;
      color: white;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 40px;
    }
  </style>
  <script>
    function display_result(result) {
      var img = document.getElementById('result');
      img.src = "data:image/jpg;base64," + result;
      img.width = 300;
      img.height = 300;
    }

    $(function () {
      // Function to preview the uploaded image
      function preview_image(event) {

        // Reset the displayed result
        var res = document.getElementById('result');
        res.src = "";
        res.width = "";
        res.height = "";

        var reader = new FileReader();
        reader.onload = function () {
          var output = document.getElementById('image-preview');
          output.src = reader.result;
        }
        reader.readAsDataURL(event.target.files[0]);
      }
      // Bind the function to the file input
      var file_input = document.getElementById('image-input');
      file_input.addEventListener('change', preview_image);

      // Bind the function to the form submit event
      $('form').on('submit', function (e) {
        console.log("Submit pressed");
        e.preventDefault();
        var form_data = new FormData(this);
        console.log(form_data);
        $.ajax({
          type: 'POST',
          url: '/segment.html',
          data: form_data,
          cache: false,
          contentType: false,
          processData: false,
          success: function (data) {
            display_result(data);
          }
        });
      });
    });
  </script>
</head>

<body>
  <nav>
    <h1>Brain Tumor Segmentation</h1>
  </nav>
  <form method="post" enctype="multipart/form-data">
    <span id="container">
      <input type="file" name="image" id="image-input" accept="image/*" required>
      <img id="image-preview" width="300" height="300">
    </span>
    <button type="submit" value="process">Process</button>
    <span id="container">
      <h1 id="output">OUTPUT</h1>
      <img id="result">
    </span>

  </form>

  </div>

</body>

</html>
