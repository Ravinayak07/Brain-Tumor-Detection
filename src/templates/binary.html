<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Binary Classification</title>
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #3F51b5;
      padding: 20px;
    }

    h1 {
      color: #fff;
      margin: 0;
      text-align: center;
      /* center align horizontally */
      flex-grow: 1;
      /* take up remaining horizontal space */
    }

    form {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 50px;
    }

    input[type="file"] {
      display: flex;
      justify-content: center;
      align-items: center;
      padding-bottom: 30px;
      padding-left: 60px;
    }

    img {
      border: 1px solid #ccc;
      border-radius: 5px;
      box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.3);
      margin-bottom: 20px;
    }

    button[type="submit"] {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background-color: #3F51b5;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button[type="submit"]:hover {
      background-color: #333;
    }

    form>h2 {
      padding: 10px 20px;
      font-size: 30px;
      transform: scale(1);
    }

    .button:hover {
      background-color: #0822b5;
      color: whitesmoke;
    }
  </style>
  <script>
    function display_result(result) {
      var res = document.getElementById('result');
      res.innerHTML = result.result;
      if (result.result == "Tumor detected") {
        res.style.color = "red";
      }
      else res.style.color = "green";
    }

    $(function () {
      // Function to preview the uploaded image
      function preview_image(event) {

        // Reset the displayed result
        var res = document.getElementById('result');
        res.innerHTML = "";

        var reader = new FileReader();
        reader.onload = function () {
          var output = document.getElementById('image-preview');
          output.src = reader.result;
        }
        reader.readAsDataURL(event.target.files[0]);
      }
      // Bind the function to the file input
      var file_input = document.getElementById('image-input');
      file_input.addEventListener('change', preview_image);

      // Bind the function to the form submit event
      $('form').on('submit', function (e) {
        e.preventDefault();
        var form_data = new FormData(this);
        $.ajax({
          type: 'POST',
          url: '/binary.html',
          data: form_data,
          cache: false,
          contentType: false,
          processData: false,
          success: function (data) {
            display_result(data);
          }
        });
      });
    });
  </script>
</head>

<body>
  <nav>
    <h1>Binary Classification</h1>
  </nav>
  <form method="post" enctype="multipart/form-data">
    <input type="file" name="image" id="image-input" accept="image/*" required>
    <img id="image-preview" width="300" height="300">
    <button type="submit">Detect</button>
    <h2 id="result"></h2>
  </form>
</body>

</html>
